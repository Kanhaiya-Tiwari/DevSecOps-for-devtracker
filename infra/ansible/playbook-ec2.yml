---
- hosts: localhost
  become: true
  gather_facts: yes

  tasks:
    - name: Update system packages
      apt:
        update_cache: yes
        upgrade: safe

    - name: Install required packages
      apt:
        name:
          - curl
          - git
          - unzip
          - jq
          - python3-pip
          - apt-transport-https
          - gnupg
          - lsb-release
          - wget
        state: present

    - name: Install Python Security Tools (flake8, bandit)
      pip:
        name:
          - flake8
          - bandit
        state: present
        extra_args: --break-system-packages

    - name: Install Hadolint (Dockerfile Linter)
      shell: |
        curl -L https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
        chmod +x /usr/local/bin/hadolint
      args:
        creates: /usr/local/bin/hadolint

    - name: Install Trivy (Vulnerability Scanner)
      shell: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee /etc/apt/sources.list.d/trivy.list
        apt-get update
        apt-get install -y trivy
      args:
        creates: /usr/bin/trivy

    - name: Install Gitleaks (Secret Scanner)
      shell: |
        VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r .tag_name)
        curl -L https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION:1}_linux_x64.tar.gz -o gitleaks.tar.gz
        tar -xzf gitleaks.tar.gz
        install gitleaks /usr/local/bin/
        rm gitleaks.tar.gz gitleaks
      args:
        creates: /usr/local/bin/gitleaks
        executable: /bin/bash

    - name: Install ArgoCD CLI
      shell: |
        curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
        rm argocd-linux-amd64
      args:
        creates: /usr/local/bin/argocd
        executable: /bin/bash

    - name: Install AWS CLI v2
      shell: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install --update
        rm -rf awscliv2.zip aws
      args:
        creates: /usr/local/bin/aws

    - name: Install kubectl
      shell: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
        rm kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install Docker
      shell: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        sh get-docker.sh
        usermod -aG docker ubuntu
      args:
        creates: /usr/bin/docker

    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Install k3s (lightweight Kubernetes)
      shell: |
        PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
        if [ -z "$PUBLIC_IP" ]; then
            # Try IMDSv2 if v1 fails
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
        fi
        
        if [ -n "$PUBLIC_IP" ]; then
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --tls-san $PUBLIC_IP --disable traefik --disable servicelb" sh -
        else
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik --disable servicelb" sh -
        fi
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      shell: |
        until KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get nodes 2>/dev/null; do
          echo "Waiting for k3s to start..."
          sleep 5
        done

    - name: Verify k3s is running
      command: kubectl get nodes
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: k3s_status
      ignore_errors: yes

    - name: Display k3s status
      debug:
        var: k3s_status.stdout_lines

    - name: Get EC2 Public IP
      shell: curl -s http://169.254.169.254/latest/meta-data/public-ipv4
      register: ec2_public_ip
      ignore_errors: yes

    - name: Display EC2 Public IP
      debug:
        msg: "EC2 Public IP: {{ ec2_public_ip.stdout }}"

    - name: Setup kubectl for ubuntu user
      shell: |
        mkdir -p /home/ubuntu/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
        chown -R ubuntu:ubuntu /home/ubuntu/.kube
        chmod 600 /home/ubuntu/.kube/config
        grep -qxF 'export KUBECONFIG=/home/ubuntu/.kube/config' /home/ubuntu/.bashrc || echo 'export KUBECONFIG=/home/ubuntu/.kube/config' >> /home/ubuntu/.bashrc
        grep -qxF 'export PATH=$PATH:/usr/local/bin' /home/ubuntu/.bashrc || echo 'export PATH=$PATH:/usr/local/bin' >> /home/ubuntu/.bashrc

    - name: Verify kubectl works for ubuntu user
      shell: kubectl get nodes
      environment:
        KUBECONFIG: /home/ubuntu/.kube/config
      become_user: ubuntu
      register: kubectl_test
      ignore_errors: yes

    - name: Display kubectl test result
      debug:
        var: kubectl_test.stdout_lines

    # ── NGINX Ingress (idempotent - k3s already has Traefik but we use NGINX for routing) ──
    - name: Create ingress-nginx namespace (idempotent)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create namespace ingress-nginx --dry-run=client -o yaml | \
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -

    - name: Install NGINX Ingress Controller (idempotent)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.1/deploy/static/provider/cloud/deploy.yaml

    - name: Patch NGINX Ingress to use HostNetwork (required for bypass svclb on port 80)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl patch deployment -n ingress-nginx ingress-nginx-controller \
          --patch '{"spec": {"template": {"spec": {"hostNetwork": true, "dnsPolicy": "ClusterFirstWithHostNet"}}}}'
        
        # Change service type to ClusterIP to avoid conflict with host ports
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl patch svc -n ingress-nginx ingress-nginx-controller \
          --patch '{"spec": {"type": "ClusterIP"}}'

    - name: Wait for NGINX Ingress Controller to be ready
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait \
          --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=300s
      ignore_errors: yes

    # ── Clean up disk space ──────────────────────────────────────────────────
    - name: Clean up disk space before building images
      shell: |
        docker system prune -af || true
        apt-get clean
        apt-get autoremove -y
        journalctl --vacuum-time=7d

    # ── Docker build as ROOT (saves to /tmp which root owns) ─────────────────
    - name: Build backend Docker image
      shell: |
        cd /home/ubuntu/DevTracker-mega-project/backend
        docker build -t devtracker-backend:latest .

    - name: Build frontend Docker image
      shell: |
        cd /home/ubuntu/DevTracker-mega-project/frontend
        docker build -t devtracker-frontend:latest .

    - name: Save Docker images to /tmp
      shell: |
        docker save devtracker-backend:latest -o /tmp/backend.tar
        docker save devtracker-frontend:latest -o /tmp/frontend.tar
        chmod 644 /tmp/backend.tar /tmp/frontend.tar

    - name: Load images into k3s containerd
      shell: |
        k3s ctr images import /tmp/backend.tar
        k3s ctr images import /tmp/frontend.tar
        rm -f /tmp/backend.tar /tmp/frontend.tar

    # ── Apply namespace FIRST ────────────────────────────────────────────────
    - name: Apply Kubernetes namespace
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/kubernetes/namespace.yml

    # ── Secrets BEFORE deployments (key names match deployment manifests) ────
    - name: Create DevTracker secrets (idempotent, keys match deployment manifests)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create secret generic devtracker-secrets \
          -n devtracker \
          --from-literal=postgres-user=devtrackr \
          --from-literal=postgres-password=devtrackr \
          --from-literal=secret-key=devtrackr_jwt_secret_key_change_in_prod \
          --from-literal=database-url="postgresql+asyncpg://devtrackr:devtrackr@postgres-service:5432/devtrackr" \
          --from-literal=JWT_SECRET=devtrackr_jwt_secret_key_change_in_prod \
          --from-literal=DATABASE_URL="postgresql+asyncpg://devtrackr:devtrackr@postgres-service:5432/devtrackr" \
          --from-literal=REDIS_URL="redis://redis-service:6379/0" \
          --from-literal=OPENROUTER_API_KEY=your_key_here \
          --from-literal=OPENROUTER_MODEL="nvidia/nemotron-nano-9b-v2:free" \
          --dry-run=client -o yaml | KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -

    # ── Deploy all manifests ─────────────────────────────────────────────────
    - name: Deploy DevTracker Application manifests
      shell: |
        cd /home/ubuntu/DevTracker-mega-project/infra/kubernetes
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        kubectl apply -f configmap.yml
        kubectl apply -f nginx-configmap.yml
        kubectl apply -f postgres-statefulset.yml
        kubectl apply -f postgres-service.yml
        kubectl apply -f redis-statefulset.yml
        kubectl apply -f redis-service.yml
        kubectl apply -f backend-deployment.yml
        kubectl apply -f backend-service.yml
        kubectl apply -f frontend-deployment.yml
        kubectl apply -f frontend-service.yml
        kubectl apply -f ingress-ip.yml

    # ── Wait for all pods ────────────────────────────────────────────────────
    - name: Wait for Database Pods
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait \
          --for=condition=ready pod -l component=database \
          -n devtracker --timeout=300s
      ignore_errors: yes

    - name: Wait for Cache Pods
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait \
          --for=condition=ready pod -l component=cache \
          -n devtracker --timeout=300s
      ignore_errors: yes

    - name: Wait for Backend Pods
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait \
          --for=condition=ready pod -l component=backend \
          -n devtracker --timeout=300s
      ignore_errors: yes

    - name: Wait for Frontend Pods
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait \
          --for=condition=ready pod -l component=frontend \
          -n devtracker --timeout=300s
      ignore_errors: yes

    - name: Get Application Status
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get all -n devtracker
      register: app_status

    - name: Display Application Status
      debug:
        var: app_status.stdout_lines

    # ── ArgoCD ────────────────────────────────────────────────────────────────
    - name: Create ArgoCD namespace
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create namespace argocd \
          --dry-run=client -o yaml | KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -

    - name: Install ArgoCD (Server-side apply to avoid CRD annotation limits)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -n argocd \
          -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml \
          --server-side --force-conflicts

    - name: Patch ArgoCD service to NodePort
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl patch svc argocd-server -n argocd \
          --patch '{"spec": {"type": "NodePort", "ports": [{"name": "https", "nodePort": 30443, "port": 443, "targetPort": 443}]}}'

    - name: Wait for ArgoCD
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s
      ignore_errors: yes

    # ── Cert-Manager (Automatic HTTPS) ────────────────────────────────────────
    - name: Install Cert-Manager (idempotent)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          https://github.com/cert-manager/cert-manager/releases/download/v1.13.1/cert-manager.yaml
    
    - name: Wait for Cert-Manager pods
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait --for=condition=ready pod \
          -l app.kubernetes.io/instance=cert-manager -n cert-manager --timeout=300s
      ignore_errors: yes

    - name: Apply Let's Encrypt ClusterIssuer
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/kubernetes/cert-manager-issuer.yml

    # ── Prometheus & Grafana (Custom manifests) ──────────────────────────────
    - name: Create monitoring namespace
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/monitoring/namespace.yaml

    - name: Apply Prometheus config
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/monitoring/prometheus/config.yaml

    - name: Apply Prometheus deployment
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/monitoring/prometheus/deployment.yaml

    - name: Apply Prometheus exporters
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/monitoring/prometheus/exporters.yaml

    - name: Create Grafana secret (BEFORE deployment)
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl create secret generic grafana-secret \
          -n monitoring --from-literal=admin-password=admin123 --dry-run=client -o yaml | \
          KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f -

    - name: Apply Grafana dashboards config
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/monitoring/grafana/dashboards-configmap.yaml

    - name: Apply Grafana deployment
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl apply -f \
          /home/ubuntu/DevTracker-mega-project/infra/monitoring/grafana/deployment.yaml

    - name: Wait for Prometheus
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait --for=condition=ready pod \
          -l app=prometheus -n monitoring --timeout=120s
      ignore_errors: yes

    - name: Wait for Grafana
      shell: |
        KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl wait --for=condition=ready pod \
          -l app=grafana -n monitoring --timeout=120s
      ignore_errors: yes

    - name: Display Access Information
      debug:
        msg: |
          =========================================
          DevTracker Deployment Complete!
          =========================================
          App URL (HTTP):  http://{{ ec2_public_ip.stdout }}
          App URL (HTTPS): https://{{ ec2_public_ip.stdout }}

          SSH access:
          ssh -i Devtracker.pem ubuntu@{{ ec2_public_ip.stdout }}

          ArgoCD:
          URL: https://{{ ec2_public_ip.stdout }}:30443
          Get password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d
          Username: admin
          Or port-forward: kubectl port-forward svc/argocd-server -n argocd 8443:443

          Prometheus:
          URL: http://{{ ec2_public_ip.stdout }}:30900
          Or port-forward: kubectl port-forward svc/prometheus -n monitoring 9090:9090

          Grafana:
          URL: http://{{ ec2_public_ip.stdout }}:30300
          Username: admin
          Password: admin123
          Or port-forward: kubectl port-forward svc/grafana -n monitoring 3000:3000

          Full bootstrap log:
          sudo cat /var/log/devtracker-bootstrap.log
          =========================================