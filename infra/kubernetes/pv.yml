---
# NOTE: These PV/PVC files are OPTIONAL for k3s.
# k3s has built-in dynamic provisioning with the "local-path" storage class.
# The StatefulSets already use volumeClaimTemplates which will automatically create PVCs.
# Only use these files if you need manual PV management or for clusters without dynamic provisioning.

# Persistent Volume for PostgreSQL
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  namespace: devtracker
  labels:
    type: local
    app: postgres
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/postgres

---
# Persistent Volume for Redis (optional - for Redis persistence)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
  namespace: devtracker
  labels:
    type: local
    app: redis
spec:
  storageClassName: manual
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/redis