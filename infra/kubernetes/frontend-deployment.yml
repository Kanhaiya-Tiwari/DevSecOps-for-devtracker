apiVersion: apps/v1
kind: Deployment
metadata:
  name: devtracker-frontend
  namespace: devtracker
  labels:
    app: devtracker-frontend
    version: v1
    component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: devtracker-frontend
  template:
    metadata:
      labels:
        app: devtracker-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: kanhaiyatiwari/devtracker-frontend:161bbb221570beba5a1e5bafb1b6b407518727c4
        imagePullPolicy: Never
        ports:
        - containerPort: 80
          name: http
        env:
        - name: VITE_API_BASE_URL
          value: "/api/v1"
        - name: NODE_ENV
          value: "production"
        - name: VITE_SUPABASE_URL
          value: ""
        - name: VITE_SUPABASE_PUBLISHABLE_KEY
          value: ""
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
