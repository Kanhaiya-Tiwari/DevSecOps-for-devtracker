apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devtracker-production-ingress
  namespace: devtracker
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - devtracker.example.com
    secretName: devtracker-tls
  rules:
  - host: devtracker.example.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: devtracker-backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: devtracker-frontend-service
            port:
              number: 80
