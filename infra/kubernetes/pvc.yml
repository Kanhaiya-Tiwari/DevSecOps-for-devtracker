---
# NOTE: These PV/PVC files are OPTIONAL for k3s.
# k3s has built-in dynamic provisioning with the "local-path" storage class.
# The StatefulSets already use volumeClaimTemplates which will automatically create PVCs.
# Only use these files if you need manual PV management or for clusters without dynamic provisioning.

# Persistent Volume Claim for PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: devtracker
  labels:
    app: postgres
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      app: postgres

---
# Persistent Volume Claim for Redis (optional)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: devtracker
  labels:
    app: redis
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  selector:
    matchLabels:
      app: redis