apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: devtracker
data:
  default.conf: |
    upstream backend {
        server devtracker-backend-service.devtracker.svc.cluster.local:8000;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Backend API - full path pass-through (backend has /api/v1/* routes)
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
        }

        # Health check direct to backend
        location = /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # Prometheus metrics endpoint for nginx
        location /nginx_metrics {
            stub_status on;
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # Frontend SPA - serve index.html for all other routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
