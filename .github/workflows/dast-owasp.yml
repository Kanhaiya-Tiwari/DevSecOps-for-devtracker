# Reusable workflow for Dynamic Application Security Testing (DAST) using OWASP ZAP.
# Purpose: Scans the running application for vulnerabilities like XSS, SQLi, and misconfigurations.
name: Reusable OWASP ZAP DAST Scan

on:
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    name: Scan the web application
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP Baseline Scan (Manual Docker)
        run: |
          mkdir -p zap-out
          chmod 777 zap-out
          docker run --rm -v $(pwd)/zap-out:/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t ${{ inputs.target_url }} \
            -J report.json \
            -w report.md \
            -r report.html || true

      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports
          path: zap-out/
