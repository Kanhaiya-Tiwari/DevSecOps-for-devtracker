# This is the main orchestrator workflow for the DevSecOps pipeline.
# It runs on every push and pull request to the main branch.
# It calls individual reusable workflows to perform security scans, builds, and deployments.
name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # STAGE 1: Lint & Static Security Analysis
  sast-linter:
    uses: ./.github/workflows/sast-flake8.yml

  sast-security:
    uses: ./.github/workflows/sast-bandit.yml

  docker-lint:
    uses: ./.github/workflows/docker-hadolint.yml

  secret-scan:
    uses: ./.github/workflows/security-gitleaks.yml

  dependency-scan:
    uses: ./.github/workflows/security-dependency.yml

  # STAGE 2: Build & Push
  build-and-push:
    name: Build & Push
    needs: [sast-linter, sast-security, docker-lint, secret-scan, dependency-scan]
    uses: ./.github/workflows/build-push.yml
    with:
      image_name: devtracker
      image_tag: ${{ github.sha }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # STAGE 3: Container Security Scan
  backend-scan:
    name: Scan Backend
    needs: build-and-push
    uses: ./.github/workflows/docker-trivy.yml
    with:
      image: "devtracker-backend:${{ github.sha }}"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  frontend-scan:
    name: Scan Frontend
    needs: build-and-push
    uses: ./.github/workflows/docker-trivy.yml
    with:
      image: "devtracker-frontend:${{ github.sha }}"
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  # STAGE 4: GitOps Deployment (Update Manifests)
  deploy-gitops:
    name: GitOps Deploy
    needs: [backend-scan, frontend-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kubernetes Manifests
        run: |
          sed -i "s|image: .*devtracker-backend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/devtracker-backend:${{ github.sha }}|g" infra/kubernetes/backend-deployment.yml
          sed -i "s|image: .*devtracker-frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/devtracker-frontend:${{ github.sha }}|g" infra/kubernetes/frontend-deployment.yml
          
      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/kubernetes/*.yml
          git commit -m "chore(deploy): update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push origin master

  # STAGE 5: Post-Deployment Verification & Notifications
  dast-scan:
    name: DAST Scan
    needs: deploy-gitops
    uses: ./.github/workflows/dast-owasp.yml
    with:
      target_url: 'http://44.198.175.124'

  send-notification:
    name: Send Notification
    needs: [deploy-gitops, dast-scan]
    if: always()
    uses: ./.github/workflows/notifications.yml
    with:
      status: ${{ needs.deploy-gitops.result == 'success' && 'SUCCESS' || 'FAILURE' }}
      job_name: 'DevSecOps Pipeline Execution'
    secrets: inherit
