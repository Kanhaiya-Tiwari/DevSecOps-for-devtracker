# Reusable workflow for secret scanning using Gitleaks.
# Purpose: Prevents accidental commits of sensitive information like API keys, secrets, and credentials.
name: Reusable Gitleaks Scan

on:
  workflow_call:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
