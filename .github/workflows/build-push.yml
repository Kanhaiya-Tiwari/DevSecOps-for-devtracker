# Reusable workflow for building Docker images and pushing them to DockerHub.
# Purpose: Automates the containerization and distribution of backend and frontend services.
name: Reusable Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}-backend:${{ inputs.image_tag }}, ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}-frontend:${{ inputs.image_tag }}, ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image_name }}-frontend:latest
