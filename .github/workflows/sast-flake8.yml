# Reusable workflow for Python code linting using Flake8.
# Purpose: Ensures code style consistency and catches basic syntax errors.
name: Reusable Flake8 Linter

on:
  workflow_call:

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
