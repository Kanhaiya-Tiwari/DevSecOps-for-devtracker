
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3}
.wrap{position:relative;width:100%;background:#0d1117;padding-bottom:8px}
.dl-btn{display:flex;align-items:center;gap:8px;margin:0 0 10px 0;padding:8px 20px;background:#21262d;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s;width:fit-content}
.dl-btn:hover{background:#30363d;border-color:#58a6ff;color:#58a6ff}
.dl-btn svg{width:16px;height:16px;fill:currentColor}
svg.diagram{width:100%;display:block}

/* Flowing animated dashes */
@keyframes flow-green  { to { stroke-dashoffset: -24; } }
@keyframes flow-blue   { to { stroke-dashoffset: -24; } }
@keyframes flow-amber  { to { stroke-dashoffset: -20; } }
@keyframes flow-orange { to { stroke-dashoffset: -20; } }
@keyframes flow-purple { to { stroke-dashoffset: -20; } }
@keyframes flow-cyan   { to { stroke-dashoffset: -20; } }

.flow-green  { stroke-dasharray:8,5; animation:flow-green  1.2s linear infinite; }
.flow-blue   { stroke-dasharray:8,5; animation:flow-blue   1.0s linear infinite; }
.flow-amber  { stroke-dasharray:6,4; animation:flow-amber  0.9s linear infinite; }
.flow-orange { stroke-dasharray:7,4; animation:flow-orange 1.1s linear infinite; }
.flow-purple { stroke-dasharray:7,4; animation:flow-purple 1.3s linear infinite; }
.flow-cyan   { stroke-dasharray:6,4; animation:flow-cyan   1.0s linear infinite; }

/* Pulse glow on port labels */
@keyframes pulse-port { 0%,100%{opacity:1} 50%{opacity:.5} }
.pulse { animation: pulse-port 2s ease-in-out infinite; }

.nt{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;fill:#e6edf3}
.ns{font-family:'Inter',sans-serif;font-size:9px;fill:#8b949e}
.zl{font-family:'JetBrains Mono',monospace;font-size:9px}
.pb{font-family:'JetBrains Mono',monospace;font-size:8px}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function downloadDiagram() {
  const btn = document.querySelector('.dl-btn');
  btn.textContent = 'Generating PNG…';
  btn.disabled = true;

  const svg = document.getElementById('archDiagram');
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  const svgBlob = new Blob([svgStr], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = function() {
    const scale = 2;
    const canvas = document.createElement('canvas');
    canvas.width = svg.viewBox.baseVal.width * scale;
    canvas.height = svg.viewBox.baseVal.height * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);

    canvas.toBlob(function(blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'DevTrackr-Architecture.png';
      a.click();
      btn.innerHTML = '<svg viewBox="0 0 16 16" style="width:16px;height:16px;fill:currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14ZM7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.97a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.779a.749.749 0 1 1 1.06-1.06Z"/></svg> Download as PNG';
      btn.disabled = false;
    }, 'image/png');
  };
  img.src = url;
}
</script>
